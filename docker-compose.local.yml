services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yeschess
      POSTGRES_USER: yeschess
      POSTGRES_PASSWORD: localpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yeschess"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata_local: