services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yeschess
      POSTGRES_USER: yeschess
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yeschess"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - default

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://yeschess:${DB_PASSWORD}@db:5432/yeschess
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://api.yeschess.school
      - FRONTEND_URL=https://yeschess.school
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM:-YesChess <noreply@yeschess.school>}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yeschess-backend.rule=Host(`api.yeschess.school`)"
      - "traefik.http.routers.yeschess-backend.entrypoints=websecure"
      - "traefik.http.routers.yeschess-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.yeschess-backend.loadbalancer.server.port=3000"
    networks:
      - dokploy-network
      - default

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yeschess-frontend.rule=Host(`yeschess.school`)"
      - "traefik.http.routers.yeschess-frontend.entrypoints=websecure"
      - "traefik.http.routers.yeschess-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.yeschess-frontend.loadbalancer.server.port=80"
    networks:
      - dokploy-network
      - default

  backup:
    image: postgres:16-alpine
    volumes:
      - backups:/backups
    environment:
      - PGHOST=db
      - PGUSER=yeschess
      - PGPASSWORD=${DB_PASSWORD}
      - PGDATABASE=yeschess
    entrypoint: ["/bin/sh", "-c", "echo '0 3 * * * pg_dump -Fc > /backups/yeschess_$(date +\\%Y\\%m\\%d).dump && find /backups -mtime +7 -delete' | crontab - && crond -f"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default

volumes:
  pgdata:
  backups:

networks:
  dokploy-network:
    external: true
