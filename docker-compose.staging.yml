services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yeschess
      POSTGRES_USER: yeschess
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata-staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yeschess"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - default

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://yeschess:${DB_PASSWORD}@db:5432/yeschess
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=https://api-staging.yeschess.school
      - FRONTEND_URL=https://staging.yeschess.school
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yeschess-staging-backend.rule=Host(`api-staging.yeschess.school`)"
      - "traefik.http.routers.yeschess-staging-backend.entrypoints=websecure"
      - "traefik.http.routers.yeschess-staging-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.yeschess-staging-backend.loadbalancer.server.port=3001"
    networks:
      - dokploy-network
      - default

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.yeschess-staging-frontend.rule=Host(`staging.yeschess.school`)"
      - "traefik.http.routers.yeschess-staging-frontend.entrypoints=websecure"
      - "traefik.http.routers.yeschess-staging-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.yeschess-staging-frontend.loadbalancer.server.port=80"
    networks:
      - dokploy-network
      - default

volumes:
  pgdata-staging:

networks:
  dokploy-network:
    external: true
