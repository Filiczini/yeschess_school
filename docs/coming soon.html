<html lang="uk"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YesChess School | Незабаром відкриття</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@400;500;600&amp;display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, h4, h5, h6 { font-family: 'Manrope', sans-serif; }
        .pattern-bg {
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#2E15C8] to-[#2A15B1] text-slate-50 antialiased selection:bg-white selection:text-[#2E15C8] min-h-screen flex flex-col relative overflow-hidden font-normal">

    <!-- Decorative Background Effects -->
    <div class="absolute inset-0 pattern-bg opacity-20 pointer-events-none z-0"></div>
    <div class="absolute top-0 right-0 -mr-20 -mt-20 w-96 h-96 bg-[#5440C5] rounded-full blur-3xl opacity-50 pointer-events-none z-0"></div>
    <div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 bg-[#D4CFEC] rounded-full blur-3xl opacity-20 pointer-events-none z-0"></div>

    <!-- Header -->
    <header class="relative z-10 w-full max-w-7xl mx-auto px-6 h-24 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center text-[#2E15C8]">
                <iconify-icon icon="solar:crown-linear" width="24" height="24" stroke-width="1.5"></iconify-icon>
            </div>
            <span class="text-white font-semibold tracking-tight text-xl uppercase">YesChess</span>
        </div>
        <a href="tel:+380980837742" class="hidden sm:flex items-center gap-2 text-white/80 hover:text-white transition-colors text-sm font-medium">
            <iconify-icon icon="solar:phone-linear" width="18" height="18" stroke-width="1.5"></iconify-icon>
            +38 (098) 083-77-42
        </a>
    </header>

    <!-- Main Content -->
    <main class="relative z-10 flex-1 flex items-center justify-center px-6 py-12">
        <div class="max-w-2xl mx-auto text-center">
            <!-- Badge -->
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/10 border border-white/20 text-white text-xs font-medium mb-8 backdrop-blur-sm">
                <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                Оновлення платформи
            </div>
            
            <!-- Typography -->
            <h1 class="text-4xl md:text-5xl lg:text-6xl font-medium text-white tracking-tight mb-6 leading-[1.1]">
                Ми готуємо щось <br class="hidden sm:block">
                <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-200 to-white">особливе.</span>
            </h1>
            
            <p class="text-base md:text-lg text-blue-100 mb-10 font-medium leading-relaxed max-w-xl mx-auto">
                Новий сайт шахової школи YesChess вже у розробці. Залиште свій email, щоб першими дізнатися про запуск та отримати запрошення на безкоштовне пробне заняття.
            </p>
            
            <!-- Email Form -->
            <form class="flex flex-col sm:flex-row items-center justify-center gap-3 max-w-md mx-auto w-full" onsubmit="event.preventDefault();">
                <div class="relative w-full">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-white/50">
                        <iconify-icon icon="solar:letter-linear" width="20" height="20" stroke-width="1.5"></iconify-icon>
                    </div>
                    <input type="email" placeholder="Ваш email..." class="w-full bg-white/5 border border-white/10 rounded-2xl pl-11 pr-4 py-3.5 text-white placeholder:text-white/40 focus:outline-none focus:ring-2 focus:ring-white/20 focus:border-white/30 transition-all text-sm font-medium backdrop-blur-md" required="">
                </div>
                <button type="submit" class="w-full sm:w-auto px-6 py-3.5 bg-white text-[#2E15C8] rounded-2xl font-medium text-sm hover:bg-blue-50 hover:shadow-lg hover:shadow-white/10 transition-all duration-300 flex items-center justify-center gap-2 whitespace-nowrap">
                    Повідомити мене
                    <iconify-icon icon="solar:plain-2-linear" width="18" height="18" stroke-width="1.5"></iconify-icon>
                </button>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="relative z-10 w-full max-w-7xl mx-auto px-6 py-8 flex flex-col sm:flex-row items-center justify-between gap-4 border-t border-white/10">
        <p class="text-blue-200/60 text-xs font-medium">
            © 2024 YesChess School. Коломия, Україна.
        </p>
        <div class="flex items-center gap-4">
            <a href="#" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-white/80 hover:bg-white/10 hover:text-white transition-all backdrop-blur-sm">
                <iconify-icon icon="solar:camera-linear" width="20" height="20" stroke-width="1.5"></iconify-icon>
            </a>
            <a href="#" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-white/80 hover:bg-white/10 hover:text-white transition-all backdrop-blur-sm">
                <iconify-icon icon="solar:users-group-rounded-linear" width="20" height="20" stroke-width="1.5"></iconify-icon>
            </a>
            <a href="#" class="w-10 h-10 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-white/80 hover:bg-white/10 hover:text-white transition-all backdrop-blur-sm">
                <iconify-icon icon="solar:paperclip-linear" width="20" height="20" stroke-width="1.5"></iconify-icon>
            </a>
        </div>
    </footer>


</body></html>
